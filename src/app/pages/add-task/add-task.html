<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white p-3">
          <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Task</h4>
        </div>
        
        <div class="card-body p-4">
          <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
            
            <div class="row mb-3">
              <div class="col-md-8">
                <label class="form-label fw-bold">Task Title</label>
                <input type="text" class="form-control" formControlName="title" placeholder="What do you need to do?">
                @if (taskForm.get('title')?.invalid && taskForm.get('title')?.touched) {
                  <small class="text-danger">Title is required (min 3 chars).</small>
                }
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold">Due Date</label>
                <input type="date" class="form-control" formControlName="dueDate">
              </div>
            </div>

            <div class="row mb-4">
              <div class="col-md-6">
                <label class="form-label fw-bold">Priority</label>
                <select class="form-select" formControlName="priority">
                  <option value="High">High</option>
                  <option value="Medium">Medium</option>
                  <option value="Low">Low</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Category</label>
                <select class="form-select" formControlName="category">
                  <option value="Work">Work</option>
                  <option value="Study">Study</option>
                  <option value="Personal">Personal</option>
                  <option value="Health">Health</option>
                </select>
              </div>
            </div>

            <div class="d-flex justify-content-end border-top pt-3">
              <button type="button" class="btn btn-light me-2" routerLink="/tasks">Cancel</button>
              <button type="submit" class="btn btn-primary px-4" [disabled]="taskForm.invalid">Add Task</button>
            </div>
            
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
