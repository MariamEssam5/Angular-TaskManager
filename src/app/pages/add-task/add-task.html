<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white p-3">
          <h4 class="mb-0">✨ Add New Task</h4>
        </div>
        
        <div class="card-body p-4">
          <form>
            <div class="row mb-3">
              <div class="col-md-8">
                <label class="form-label fw-bold">Task Title</label>
                <input type="text" class="form-control" placeholder="What do you need to do?">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold">Due Date</label>
                <input type="date" class="form-control">
              </div>
            </div>

            <div class="row mb-4">
              <div class="col-md-6">
                <label class="form-label fw-bold">Priority</label>
                <select class="form-select">
                  <option selected>High</option>
                  <option>Medium</option>
                  <option>Low</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Category</label>
                <select class="form-select">
                  <option selected>Work</option>
                  <option>Study</option>
                  <option>Personal</option>
                </select>
              </div>
            </div>

            <div class="d-flex justify-content-end border-top pt-3">
              <button type="button" class="btn btn-light me-2" routerLink="/tasks">Cancel</button>
              <button type="button" class="btn btn-primary px-4">Add Task</button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
