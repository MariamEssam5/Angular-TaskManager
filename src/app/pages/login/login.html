<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm p-4">
      <h3 class="text-center mb-4">Login</h3>

      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            name="username"
            ngModel
            required
            minlength="3"
            #username="ngModel"
          />

          @if (username.invalid && username.dirty) {
            <small class="text-danger">Username is required min 3 chars.</small>
          }
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            name="password"
            ngModel
            required
            minlength="6"
            #password="ngModel"
          />

          @if (password.invalid && password.dirty) {
            <small class="text-danger">Password is required min 6 chars.</small>
          }
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
          Login
        </button>
        <p class="text-center mt-3">
          Don't have an account?
          <a routerLink="/signup" class="text-primary text-decoration-none fw-bold">Sign up here</a>
        </p>
      </form>
    </div>
  </div>
</div>
