<div class="container mt-4">
  
  <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
    <h2 class="mb-0">📋 My Tasks</h2>
    <button class="btn btn-primary" routerLink="/add-task">+ Create New Task</button>
  </div>

  <ul class="nav nav-pills mb-4">
    <li class="nav-item">
      <a class="nav-link active" href="#" (click)="$event.preventDefault()">All Tasks</a>
    </li>
    <li class="nav-item">
      <a class="nav-link text-success" href="#" (click)="$event.preventDefault()">Done </a>
    </li>
    <li class="nav-item">
      <a class="nav-link text-danger" href="#" (click)="$event.preventDefault()">Not Done </a>
    </li>
  </ul>

  <div class="row">
    
    <div class="col-12 mb-3">
      <div class="card shadow-sm border-0 border-start border-danger border-4">
        <div class="card-body d-flex justify-content-between align-items-center">
          
          <div>
            <h5 class="card-title mb-2">Finish Angular Project</h5>
            <p class="text-muted small mb-0">
              <span class="badge bg-danger me-2">High</span>
              <span class="badge bg-secondary me-2">Study</span>
              📅 2026-05-15
            </p>
          </div>
          
          <div class="d-flex align-items-center gap-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="task1">
              <label class="form-check-label" for="task1">Done</label>
            </div>
            <button class="btn btn-sm btn-outline-primary">Update</button>
            <button class="btn btn-sm btn-outline-danger">Delete</button>
          </div>

        </div>
      </div>
    </div>

    <div class="col-12 mb-3">
      <div class="card shadow-sm border-0 border-start border-success border-4 bg-light">
        <div class="card-body d-flex justify-content-between align-items-center">
          
          <div>
            <h5 class="card-title mb-2 text-decoration-line-through text-muted">Angular Session Studying</h5>
            <p class="text-muted small mb-0">
              <span class="badge bg-success me-2">Low</span>
              <span class="badge bg-secondary me-2">Study</span>
              📅 2026-04-20
            </p>
          </div>
          
          <div class="d-flex align-items-center gap-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="task2" checked>
              <label class="form-check-label" for="task2">Done</label>
            </div>
            <button class="btn btn-sm btn-outline-secondary" disabled>Update</button>
            <button class="btn btn-sm btn-outline-danger">Delete</button>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
